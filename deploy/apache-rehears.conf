<VirtualHost *:80>
    ServerName rehears.ru
    ServerAlias www.rehears.ru

    DocumentRoot /var/www/rehearsals/dist

    <Directory /var/www/rehearsals/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:3001/api
    ProxyPassReverse /api http://127.0.0.1:3001/api

    ErrorLog ${APACHE_LOG_DIR}/rehears-error.log
    CustomLog ${APACHE_LOG_DIR}/rehears-access.log combined
</VirtualHost>
